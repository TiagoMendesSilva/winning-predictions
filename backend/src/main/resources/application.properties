spring.application.name=guesses

spring.datasource.url=jdbc:postgresql://localhost:5432/winning_predictions
spring.datasource.username=winning_predictions_app
spring.datasource.password=winning_predictions_app
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
